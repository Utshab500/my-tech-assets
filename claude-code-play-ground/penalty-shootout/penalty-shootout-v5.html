<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚽ Penalty Shootout</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#040d04;font-family:'Barlow Condensed',sans-serif;user-select:none;-webkit-user-select:none;touch-action:none}
:root{--accent:#f5c518;--green:#00c853;--yellow:#ffd600;--red:#dd2c00;--hud:rgba(0,0,0,0.80);--post:#f2f2f2}
#gameCanvas{display:block;position:fixed;inset:0;width:100%;height:100%;cursor:default}
#hud{position:fixed;top:clamp(10px,2vh,18px);right:clamp(10px,2vw,20px);background:var(--hud);border:1px solid rgba(255,255,255,0.10);border-radius:clamp(8px,1.5vw,14px);padding:clamp(8px,1.5vw,14px) clamp(12px,2.5vw,22px);z-index:30;backdrop-filter:blur(10px);min-width:clamp(120px,18vw,170px)}
#hud-title{font-family:'Bebas Neue',cursive;color:var(--accent);font-size:clamp(0.7rem,1.8vw,0.95rem);letter-spacing:2.5px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.10);padding-bottom:5px;margin-bottom:6px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:clamp(2px,0.4vh,4px) 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.srow:last-child{border:none}
.slbl{font-size:clamp(0.6rem,1.4vw,0.78rem);color:#90a4ae;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.sval{font-family:'Bebas Neue',cursive;font-size:clamp(1.1rem,2.8vw,1.7rem);color:#fff}
.sval.g{color:#69f0ae}.sval.m{color:#ff5252}
#powerWrap{position:fixed;bottom:clamp(18px,5vh,55px);right:clamp(14px,3vw,34px);display:none;flex-direction:column;align-items:center;gap:5px;z-index:25}
#pwrLabel{font-family:'Bebas Neue',cursive;color:#fff;font-size:clamp(0.65rem,1.8vw,0.85rem);letter-spacing:2px}
#pwrTrack{width:clamp(20px,3.5vw,30px);height:clamp(110px,21vh,190px);border-radius:18px;position:relative;border:2px solid rgba(255,255,255,0.18);box-shadow:0 0 18px rgba(0,0,0,0.65),inset 0 0 8px rgba(0,0,0,0.5);overflow:hidden;background:#111}
#pwrFill{position:absolute;inset:0;background:linear-gradient(to bottom,#dd2c00 0%,#ffd600 22%,#00c853 50%,#ffd600 78%,#dd2c00 100%)}
#pwrIndicator{position:absolute;left:-4px;right:-4px;height:6px;background:#fff;border-radius:3px;box-shadow:0 0 8px rgba(255,255,255,0.95),0 0 18px #fff;z-index:2;top:50%;transition:top 14ms linear}
#timerWrap{position:fixed;bottom:clamp(18px,5vh,55px);left:clamp(14px,3vw,34px);display:none;z-index:25}
#timerSvg{overflow:visible}
#timerTxt{font-family:'Bebas Neue',cursive;font-size:clamp(0.85rem,2.2vw,1.1rem);fill:#fff;text-anchor:middle;dominant-baseline:central}
#zoneBadge{position:fixed;bottom:clamp(18px,5vh,55px);left:50%;transform:translateX(-50%);display:none;font-family:'Bebas Neue',cursive;font-size:clamp(0.9rem,2.5vw,1.2rem);letter-spacing:2px;padding:5px 18px;border-radius:50px;z-index:25;border:1.5px solid rgba(255,255,255,0.2);transition:background 0.15s,color 0.15s}
#resultFlash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:50;font-family:'Bebas Neue',cursive;font-size:clamp(2.8rem,9vw,5.5rem);letter-spacing:5px;pointer-events:none;opacity:0;transition:transform 0.22s cubic-bezier(.34,1.56,.64,1),opacity 0.3s;text-shadow:0 4px 28px rgba(0,0,0,0.9);white-space:nowrap}
#resultFlash.on{transform:translate(-50%,-50%) scale(1);opacity:1}
#resultFlash.goal-c{color:#69f0ae}#resultFlash.miss-c{color:#ff5252}#resultFlash.time-c{color:var(--accent)}#resultFlash.save-c{color:#ff9800}
#hint{position:fixed;bottom:clamp(10px,2vh,18px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.60);color:rgba(255,255,255,0.72);font-size:clamp(0.68rem,1.8vw,0.88rem);font-weight:700;letter-spacing:1px;padding:6px 18px;border-radius:50px;z-index:22;pointer-events:none;transition:opacity 0.35s;border:1px solid rgba(255,255,255,0.08);text-transform:uppercase;white-space:nowrap}
.cf{position:fixed;pointer-events:none;z-index:60;animation:cffall linear forwards}
@keyframes cffall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(106vh) rotate(740deg);opacity:0}}
#intro{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(10px)}
.ibox{background:linear-gradient(148deg,#0e230a 0%,#071305 100%);border:1px solid rgba(245,197,24,0.22);border-radius:clamp(12px,2vw,22px);padding:clamp(22px,5vw,46px) clamp(22px,6vw,54px);max-width:440px;width:100%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.85);animation:iboxIn 0.48s cubic-bezier(.34,1.56,.64,1)}
@keyframes iboxIn{from{opacity:0;transform:scale(0.72) translateY(44px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ibox h1{font-family:'Bebas Neue',cursive;font-size:clamp(2.2rem,7.5vw,3.8rem);color:var(--accent);letter-spacing:5px;line-height:1;text-shadow:0 0 38px rgba(245,197,24,0.42);margin-bottom:3px}
.ibox .sub{font-size:clamp(0.7rem,1.8vw,0.88rem);color:#80cbc4;letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:clamp(14px,3vh,26px)}
.steps{text-align:left;margin-bottom:clamp(14px,3vh,24px)}
.step{display:flex;align-items:flex-start;gap:10px;padding:clamp(4px,0.8vh,8px) 0;border-bottom:1px solid rgba(255,255,255,0.06);color:#cfd8dc;font-size:clamp(0.76rem,1.8vw,0.92rem);line-height:1.38}
.step:last-child{border:none}
.sn{min-width:22px;height:22px;background:var(--accent);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:0.82rem;flex-shrink:0;margin-top:1px}
.btn-go{font-family:'Bebas Neue',cursive;font-size:clamp(1.1rem,3.2vw,1.5rem);letter-spacing:4px;padding:clamp(10px,2vh,15px) clamp(30px,7vw,52px);background:var(--accent);color:#000;border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 22px rgba(245,197,24,0.42);transition:transform 0.14s,box-shadow 0.14s}
.btn-go:hover{transform:translateY(-3px);box-shadow:0 8px 34px rgba(245,197,24,0.58)}.btn-go:active{transform:scale(0.96)}
#handPicker{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:101;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(10px)}
.hbox{background:linear-gradient(148deg,#0e230a 0%,#071305 100%);border:1px solid rgba(245,197,24,0.22);border-radius:clamp(12px,2vw,22px);padding:clamp(22px,5vw,46px) clamp(22px,6vw,54px);max-width:400px;width:100%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.85);animation:iboxIn 0.42s cubic-bezier(.34,1.56,.64,1)}
.hbox h2{font-family:'Bebas Neue',cursive;font-size:clamp(1.6rem,5vw,2.4rem);color:var(--accent);letter-spacing:4px;margin-bottom:6px}
.hbox p{color:#90a4ae;font-size:clamp(0.75rem,2vw,0.9rem);font-weight:600;margin-bottom:clamp(18px,3vh,28px);letter-spacing:0.5px}
.hand-btns{display:flex;gap:14px;justify-content:center}
.btn-hand{font-family:'Bebas Neue',cursive;font-size:clamp(1rem,3vw,1.3rem);letter-spacing:3px;padding:clamp(12px,2.5vh,18px) clamp(22px,5vw,38px);border:2px solid rgba(245,197,24,0.35);border-radius:14px;cursor:pointer;background:rgba(245,197,24,0.08);color:#f5c518;transition:transform 0.14s,background 0.14s,box-shadow 0.14s;display:flex;flex-direction:column;align-items:center;gap:6px}
.btn-hand .hand-icon{font-size:clamp(2rem,6vw,2.8rem)}
.btn-hand:hover{background:rgba(245,197,24,0.18);transform:translateY(-3px);box-shadow:0 6px 24px rgba(245,197,24,0.3)}.btn-hand:active{transform:scale(0.95)}
</style>
</head>
<body>
<div id="intro">
  <div class="ibox">
    <h1>⚽ PENALTY<br>SHOOTOUT</h1>
    <div class="sub">You vs The Keeper</div>
    <div class="steps">
      <div class="step"><div class="sn">1</div><span>Click &amp; drag the ball to aim your shot</span></div>
      <div class="step"><div class="sn">2</div><span>Watch the power bar — it bounces fast!</span></div>
      <div class="step"><div class="sn">3</div><span>Release to shoot — <strong style="color:var(--accent)">5 seconds</strong> per attempt</span></div>
    </div>
    <button class="btn-go" id="btnStart">KICK OFF 🔥</button>
  </div>
</div>
<div id="handPicker">
  <div class="hbox">
    <h2>🤔 WHICH HAND?</h2>
    <p>We'll place the power bar on your free hand side</p>
    <div class="hand-btns">
      <button class="btn-hand" id="btnLeft"><span class="hand-icon">🤚</span>LEFT HANDED</button>
      <button class="btn-hand" id="btnRight"><span class="hand-icon">✋</span>RIGHT HANDED</button>
    </div>
  </div>
</div>
<canvas id="gameCanvas"></canvas>
<div id="hud">
  <div id="hud-title">SCOREBOARD</div>
  <div class="srow"><span class="slbl">Shots</span><span class="sval" id="eShots">0</span></div>
  <div class="srow"><span class="slbl">Goals</span><span class="sval g" id="eGoals">0</span></div>
  <div class="srow"><span class="slbl">Misses</span><span class="sval m" id="eMisses">0</span></div>
</div>
<div id="powerWrap">
  <div id="pwrLabel">POWER</div>
  <div id="pwrTrack"><div id="pwrFill"></div><div id="pwrIndicator"></div></div>
</div>
<div id="timerWrap">
  <svg id="timerSvg" viewBox="0 0 54 54" width="54" height="54">
    <circle cx="27" cy="27" r="22" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="4"/>
    <circle id="timerArc" cx="27" cy="27" r="22" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round" stroke-dasharray="138.23" stroke-dashoffset="0" transform="rotate(-90 27 27)"/>
    <text id="timerTxt" x="27" y="27">5</text>
  </svg>
</div>
<div id="zoneBadge"></div>
<div id="resultFlash"></div>
<div id="hint">⚽ Click &amp; drag the ball to aim</div>
<script>
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const powerWrap=document.getElementById('powerWrap'),pwrTrack=document.getElementById('pwrTrack'),pwrInd=document.getElementById('pwrIndicator');
const timerWrap=document.getElementById('timerWrap'),timerArc=document.getElementById('timerArc'),timerTxt=document.getElementById('timerTxt');
const zoneBadge=document.getElementById('zoneBadge'),resultFlash=document.getElementById('resultFlash'),hintEl=document.getElementById('hint');
const eShots=document.getElementById('eShots'),eGoals=document.getElementById('eGoals'),eMisses=document.getElementById('eMisses');
let W,H,gameActive=false,isDragging=false,isShooting=false;
let shots=0,goals=0,misses=0;
let pwrPct=0,pwrDir=1,pwrRAF=null;
const PWR_SPEED=0.011;
let aimAngle=0,dragOrigin={x:0,y:0},arrowVisible=false;
let timerRAF=null,timerStart=null;
const SHOT_TIME=5000,CIRC=2*Math.PI*22;
let keeperX=0.5,keeperDir=1,keeperRAF=null;
const KP_BASE_SPEED=0.0035;
let ballFlight=null,ripplePhase=-1;
let G={},B={};
let keeperZone='RED',keeperAnimRAF=null;
let actx=null;
function ensureAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();}
function playKick(){if(!actx)return;const t=actx.currentTime;const buf=actx.createBuffer(1,actx.sampleRate*0.22,actx.sampleRate);const data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*Math.exp(-i/(actx.sampleRate*0.038));const src=actx.createBufferSource();src.buffer=buf;const lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=200;const g=actx.createGain();g.gain.setValueAtTime(1.5,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);src.connect(lp);lp.connect(g);g.connect(actx.destination);src.start(t);const o=actx.createOscillator();const g2=actx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(360,t);o.frequency.exponentialRampToValueAtTime(55,t+0.17);g2.gain.setValueAtTime(0.14,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.17);o.connect(g2);g2.connect(actx.destination);o.start(t);o.stop(t+0.2);}
function playCheer(){if(!actx)return;const t=actx.currentTime;[0,0.06,0.13,0.21].forEach(d=>{const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=260+Math.random()*520;g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(0.10,t+d+0.04);g.gain.exponentialRampToValueAtTime(0.001,t+d+0.32);o.connect(g);g.connect(actx.destination);o.start(t+d);o.stop(t+d+0.36);});}
function playBuzz(){if(!actx)return;const t=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=75;g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.38);o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+0.4);}
function playWhistle(){if(!actx)return;const t=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.setValueAtTime(1200,t);o.frequency.linearRampToValueAtTime(1600,t+0.12);g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+0.28);}
function computeGeometry(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;const gw=Math.min(W*0.52,500),gh=gw*0.50,post=Math.max(5,gw*0.022);G={cx:W/2,top:H*0.11,w:gw,h:gh,post,left:W/2-gw/2,right:W/2+gw/2,netLeft:W/2-gw/2+post,netRight:W/2+gw/2-post,netTop:H*0.11+post,netBot:H*0.11+gh,netW:gw-post*2,netH:gh-post};const bSz=Math.max(30,Math.min(W*0.065,50));B={cx:W/2,cy:H*0.70,r:bSz/2,sz:bSz};}
function drawGrass(){const sw=Math.max(44,W/14);for(let x=0,i=0;x<W;x+=sw,i++){ctx.fillStyle=i%2===0?'#1e4d0f':'#246012';ctx.fillRect(x,0,sw,H);}const vg=ctx.createLinearGradient(0,0,0,H*0.45);vg.addColorStop(0,'rgba(0,0,0,0.62)');vg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H*0.45);}
function drawCrowd(){const COLS=['#b71c1c','#0d47a1','#1b5e20','#f57f17','#4a148c','#e65100','#263238','#880e4f'];for(let r=0;r<5;r++){const y=r*20,hH=13+r*1.5,count=Math.ceil(W/14);for(let i=0;i<count;i++){ctx.fillStyle=COLS[(r*7+i)%COLS.length];ctx.globalAlpha=0.38+(i%3)*0.08;const hx=i*14+(r%2)*7,hy=y+Math.sin(i*2.3)*2;ctx.beginPath();ctx.ellipse(hx,hy+hH*0.7,5+r,hH*0.7,0,Math.PI,Math.PI*2);ctx.fill();ctx.fillRect(hx-4,hy+hH*0.7,8,hH*0.6);}}ctx.globalAlpha=1;}
function drawPitchLines(){ctx.save();ctx.strokeStyle='rgba(255,255,255,0.52)';ctx.lineWidth=1.8;const pH=H*0.72,boxW=W*0.52,boxH=pH*0.48;ctx.strokeRect((W-boxW)/2,H-boxH,boxW,boxH);const smW=W*0.26,smH=pH*0.22;ctx.strokeRect((W-smW)/2,H-smH,smW,smH);ctx.beginPath();ctx.arc(W/2,H-pH*0.38,Math.max(4,W*0.007),0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.65)';ctx.fill();ctx.beginPath();ctx.arc(W/2,H-pH*0.38,W*0.135,Math.PI*1.18,Math.PI*1.82);ctx.stroke();ctx.restore();}
function drawGoalPost(){const{left,right,top,h,post,w}=G;ctx.save();ctx.shadowColor='rgba(0,0,0,0.45)';ctx.shadowBlur=18;ctx.fillStyle='#f2f2f2';ctx.beginPath();ctx.roundRect(left,top,post,h,post/2);ctx.fill();ctx.beginPath();ctx.roundRect(right-post,top,post,h,post/2);ctx.fill();ctx.beginPath();ctx.roundRect(left,top,w,post,post/2);ctx.fill();ctx.restore();}
function drawNet(ripple=false,phase=0){const{netLeft,netTop,netW,netH}=G;const cols=18,rows=10,cw=netW/cols,ch=netH/rows,amp=ripple?Math.exp(-phase*0.08)*7:0;ctx.save();ctx.strokeStyle='rgba(200,200,245,0.40)';ctx.lineWidth=0.9;for(let c=0;c<=cols;c++){ctx.beginPath();for(let y=0;y<=netH;y+=3){const wx=netLeft+c*cw+Math.sin((y/netH)*Math.PI*3+c*0.6+phase*0.25)*(1.4+amp),wy=netTop+y;y===0?ctx.moveTo(wx,wy):ctx.lineTo(wx,wy);}ctx.stroke();}for(let r=0;r<=rows;r++){ctx.beginPath();for(let x=0;x<=netW;x+=3){const sag=Math.sin((x/netW)*Math.PI)*(r*1.0),wave=ripple?Math.sin((x/netW)*Math.PI*5+phase*0.38)*amp:0,wx=netLeft+x,wy=netTop+r*ch+sag+wave;x===0?ctx.moveTo(wx,wy):ctx.lineTo(wx,wy);}ctx.stroke();}ctx.restore();}
function roundRect(c,x,y,w,h,r){if(c.roundRect){c.beginPath();c.roundRect(x,y,w,h,r);}else{c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}}
function drawKeeper(){const{netLeft,netW,netTop,netH}=G;const kh=netH*0.85,kw=kh*0.58,kx=netLeft+keeperX*(netW-kw),ky=netTop+netH-kh;ctx.save();ctx.translate(kx+kw/2,ky+kh);ctx.scale(kw/52,kh/90);ctx.translate(-26,-90);ctx.fillStyle='#e53935';roundRect(ctx,13,30,26,30,5);ctx.fill();ctx.fillStyle='white';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('1',26,49);ctx.fillStyle='#ffcc99';ctx.beginPath();ctx.ellipse(26,18,12,13,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4e342e';ctx.beginPath();ctx.ellipse(26,7,12,6,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#e53935';roundRect(ctx,1,31,12,8,4);ctx.fill();roundRect(ctx,39,31,12,8,4);ctx.fill();ctx.fillStyle='#ffd54f';ctx.beginPath();ctx.ellipse(6,42,8,5.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(46,42,8,5.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1565c0';roundRect(ctx,14,58,9,22,4);ctx.fill();roundRect(ctx,29,58,9,22,4);ctx.fill();ctx.fillStyle='#212121';ctx.beginPath();ctx.ellipse(18,80,8,4.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(34,80,8,4.5,0,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawBall(x,y,radius,rotation=0,scale=1){const r=radius*scale;ctx.save();ctx.translate(x,y);ctx.rotate(rotation);ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=14;ctx.shadowOffsetY=5;const grad=ctx.createRadialGradient(-r*0.28,-r*0.28,r*0.05,0,0,r*1.0);grad.addColorStop(0,'#ffffff');grad.addColorStop(0.55,'#e0e0e0');grad.addColorStop(1,'#9e9e9e');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.shadowColor='transparent';ctx.save();ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.clip();ctx.strokeStyle='rgba(50,50,50,0.62)';ctx.lineWidth=r*0.05;ctx.beginPath();ctx.arc(0,0,r*0.42,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(0,r);ctx.stroke();ctx.beginPath();ctx.moveTo(-r,0);ctx.lineTo(r,0);ctx.stroke();ctx.beginPath();ctx.moveTo(-r*0.82,-r*0.57);ctx.quadraticCurveTo(r*0.25,-r*0.9,r*0.82,-r*0.57);ctx.stroke();ctx.beginPath();ctx.moveTo(-r*0.82,r*0.57);ctx.quadraticCurveTo(r*0.25,r*0.9,r*0.82,r*0.57);ctx.stroke();ctx.restore();const shine=ctx.createRadialGradient(-r*0.32,-r*0.35,0,-r*0.32,-r*0.35,r*0.38);shine.addColorStop(0,'rgba(255,255,255,0.55)');shine.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=shine;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawArrow(){if(!arrowVisible)return;const{cx,cy}=B;const len=Math.min(W,H)*0.18;ctx.save();ctx.translate(cx,cy);ctx.rotate(aimAngle);ctx.globalAlpha=0.88;const grad=ctx.createLinearGradient(0,0,0,-len);grad.addColorStop(0,'rgba(245,197,24,0.15)');grad.addColorStop(1,'rgba(245,197,24,0.92)');ctx.strokeStyle=grad;ctx.lineWidth=8;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,-len*0.32);ctx.lineTo(0,-len*0.95);ctx.stroke();ctx.fillStyle='#f5c518';ctx.beginPath();ctx.moveTo(0,-len);ctx.lineTo(-14,-len+24);ctx.lineTo(14,-len+24);ctx.closePath();ctx.fill();ctx.restore();}
let frameRAF=null,ballRot=0;
function drawFrame(ts){frameRAF=requestAnimationFrame(drawFrame);ctx.clearRect(0,0,W,H);drawGrass();drawCrowd();drawPitchLines();const rippling=ripplePhase>=0;drawNet(rippling,ripplePhase);if(rippling){ripplePhase++;if(ripplePhase>45)ripplePhase=-1;}drawGoalPost();drawKeeper();if(ballFlight){const elapsed=ts-ballFlight.startTs,t=Math.min(elapsed/ballFlight.dur,1),e=t*t,bx=ballFlight.sx+(ballFlight.tx-ballFlight.sx)*e,by=ballFlight.sy+(ballFlight.ty-ballFlight.sy)*e,sc=1+(ballFlight.scaleEnd-1)*e;ballRot+=0.07+pwrPct*0.06;drawBall(bx,by,B.r,ballRot,sc);if(t>=1)resolveShot();}else{drawBall(B.cx,B.cy,B.r,ballRot);}drawArrow();}
function startKeeperPatrol(){stopKeeperPatrol();function loop(){keeperX+=KP_BASE_SPEED*keeperDir;if(keeperX>=1){keeperX=1;keeperDir=-1;}if(keeperX<=0){keeperX=0;keeperDir=1;}keeperRAF=requestAnimationFrame(loop);}keeperRAF=requestAnimationFrame(loop);}
function stopKeeperPatrol(){if(keeperRAF){cancelAnimationFrame(keeperRAF);keeperRAF=null;}}
function startPower(){powerWrap.style.display='flex';pwrPct=0;pwrDir=1;animPower();}
function animPower(){pwrPct+=PWR_SPEED*pwrDir;if(pwrPct>=1){pwrPct=1;pwrDir=-1;}if(pwrPct<=0){pwrPct=0;pwrDir=1;}const th=pwrTrack.offsetHeight-6;pwrInd.style.top=((1-pwrPct)*th)+'px';updateZoneBadge(getPowerZone(pwrPct));pwrRAF=requestAnimationFrame(animPower);}
function stopPower(){if(pwrRAF){cancelAnimationFrame(pwrRAF);pwrRAF=null;}}
function getPowerZone(p){const d=Math.abs(p-0.5);if(d<0.16)return 'GREEN';if(d<0.33)return 'YELLOW';return 'RED';}
function updateZoneBadge(zone){zoneBadge.style.display='block';if(zone==='GREEN'){zoneBadge.style.background='rgba(0,200,83,0.25)';zoneBadge.style.color='#69f0ae';zoneBadge.textContent='🟢 POWER ZONE';}if(zone==='YELLOW'){zoneBadge.style.background='rgba(255,214,0,0.20)';zoneBadge.style.color='#ffd600';zoneBadge.textContent='🟡 CAUTION';}if(zone==='RED'){zoneBadge.style.background='rgba(221,44,0,0.22)';zoneBadge.style.color='#ff5252';zoneBadge.textContent='🔴 DANGER';}}
function startTimer(){timerWrap.style.display='block';timerStart=performance.now();function tick(now){const rem=Math.max(0,SHOT_TIME-(now-timerStart)),f=rem/SHOT_TIME;timerArc.style.stroke=f>0.5?'var(--accent)':f>0.25?'#ff9800':'#ff1744';timerArc.setAttribute('stroke-dashoffset',CIRC*(1-f));timerTxt.textContent=Math.ceil(rem/1000);if(rem<=0){timerWrap.style.display='none';onTimeUp();return;}timerRAF=requestAnimationFrame(tick);}timerRAF=requestAnimationFrame(tick);}
function stopTimer(){if(timerRAF){cancelAnimationFrame(timerRAF);timerRAF=null;}timerWrap.style.display='none';}
function onTimeUp(){if(isShooting)return;stopPower();arrowVisible=false;isDragging=false;powerWrap.style.display='none';zoneBadge.style.display='none';playBuzz();misses++;shots++;updateHUD();flashResult('TIME UP!','time-c');setTimeout(resetRound,1300);}
function getXY(e){if(e.touches&&e.touches.length)return{x:e.touches[0].clientX,y:e.touches[0].clientY};return{x:e.clientX,y:e.clientY};}
function onDown(e){if(!gameActive||isShooting)return;const p=getXY(e),dx=p.x-B.cx,dy=p.y-B.cy;if(Math.sqrt(dx*dx+dy*dy)>B.r*1.8)return;e.preventDefault();ensureAudio();isDragging=true;dragOrigin=p;hintEl.style.opacity='0';startPower();startTimer();}
function onMove(e){if(!isDragging||isShooting)return;e.preventDefault();const p=getXY(e),dx=p.x-dragOrigin.x,dy=p.y-dragOrigin.y;if(Math.abs(dx)>3||Math.abs(dy)>3){aimAngle=Math.atan2(dx,-dy);arrowVisible=true;}}
function onUp(e){if(!isDragging||isShooting)return;e.preventDefault();isDragging=false;stopTimer();doShoot();}
canvas.addEventListener('mousedown',onDown,{passive:false});
canvas.addEventListener('touchstart',onDown,{passive:false});
document.addEventListener('mousemove',onMove,{passive:false});
document.addEventListener('touchmove',onMove,{passive:false});
document.addEventListener('mouseup',onUp,{passive:false});
document.addEventListener('touchend',onUp,{passive:false});
document.addEventListener('contextmenu',e=>e.preventDefault());
function doShoot(){if(isShooting)return;isShooting=true;arrowVisible=false;const lockedPwr=pwrPct,lockedAngle=aimAngle,zone=getPowerZone(lockedPwr);stopPower();powerWrap.style.display='none';zoneBadge.style.display='none';shots++;updateHUD();playKick();const{netLeft,netRight,netTop,netBot,netW,netH}=G;const bx=B.cx,by=B.cy,rayDX=Math.sin(lockedAngle),rayDY=-Math.cos(lockedAngle);const powerHeight=1-Math.abs(lockedPwr-0.5)*2;const tY=netBot-powerHeight*netH*0.82-netH*0.08;let tX,aimedAtGoal;if(Math.abs(rayDY)<0.001){aimedAtGoal=false;tX=bx+rayDX*netW;}else{const rayT=(tY-by)/rayDY;tX=bx+rayDX*rayT;aimedAtGoal=rayT>0&&tX>=netLeft&&tX<=netRight;}if(!aimedAtGoal){const d0=Math.sqrt((W/2-bx)**2+(netTop-by)**2);tX=bx+rayDX*d0*0.92;}const normA=rayDX,dist=Math.sqrt((tX-bx)**2+(tY-by)**2),speed=300+powerHeight*350,dur=dist/speed*1000;stopKeeperPatrol();setTimeout(()=>triggerKeeperAI(normA,lockedPwr,zone,dur*0.65),dur*0.28);ballFlight={sx:bx,sy:by,tx:tX,ty:tY,dur,scaleEnd:0.38+powerHeight*0.20,zone,aimedAtGoal,normA,startTs:performance.now()};}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function triggerKeeperAI(normA,pwr,zone,flightDur){keeperZone=zone;if(keeperAnimRAF){cancelAnimationFrame(keeperAnimRAF);keeperAnimRAF=null;}const{netW,netH,netLeft}=G;const kw=netH*0.85*0.58,netSpan=1-kw/netW;const ballArrivalKX=clamp(ballFlight?(ballFlight.tx-netLeft-kw/2)/(netW-kw):0.5,0,netSpan);let speedFraction,targetKX;if(zone==='RED'){speedFraction=1.0;targetKX=ballArrivalKX;}else if(zone==='YELLOW'){speedFraction=0.80+Math.random()*0.15;targetKX=clamp(ballArrivalKX+(Math.random()-0.5)*0.18,0,netSpan);}else{speedFraction=0.35;targetKX=clamp(0.5+normA*0.4,0,netSpan);}const startKX=keeperX,startT=performance.now(),moveDur=flightDur*speedFraction;function animKeeper(now){const t=Math.min((now-startT)/moveDur,1),e=t<0.5?2*t*t:-1+(4-2*t)*t;keeperX=startKX+(targetKX-startKX)*e;if(t<1){keeperAnimRAF=requestAnimationFrame(animKeeper);}else{keeperAnimRAF=null;}}keeperAnimRAF=requestAnimationFrame(animKeeper);}
function resolveShot(){const{tx,zone,aimedAtGoal}=ballFlight;ballFlight=null;const{netLeft,netH,netW}=G;if(!aimedAtGoal){misses++;updateHUD();flashResult('MISS! 😬','miss-c');setTimeout(resetRound,1500);return;}if(zone==='GREEN'){goals++;updateHUD();flashResult('GOAL! 🎉','goal-c');playCheer();spawnConfetti();ripplePhase=0;setTimeout(resetRound,1600);return;}const kh=netH*0.85,kw=kh*0.58,keeperCentreX=netLeft+keeperX*(netW-kw)+kw/2,reachRadius=kw*0.6,keeperReaches=Math.abs(keeperCentreX-tx)<=reachRadius;const saved=(zone==='RED')||(zone==='YELLOW'&&keeperReaches);if(saved){misses++;updateHUD();flashResult('SAVED! 🧤','save-c');setTimeout(resetRound,1500);}else{goals++;updateHUD();flashResult('GOAL! 🎉','goal-c');playCheer();spawnConfetti();ripplePhase=0;setTimeout(resetRound,1600);}}
function resetRound(){isShooting=false;ballFlight=null;arrowVisible=false;keeperZone='RED';if(keeperAnimRAF){cancelAnimationFrame(keeperAnimRAF);keeperAnimRAF=null;}hintEl.style.opacity='1';hintEl.textContent='⚽ Click & drag the ball to aim';startKeeperPatrol();}
function updateHUD(){eShots.textContent=shots;eGoals.textContent=goals;eMisses.textContent=misses;}
function flashResult(msg,cls){resultFlash.textContent=msg;resultFlash.className=cls+' on';setTimeout(()=>{resultFlash.className='';},1300);}
function spawnConfetti(){const COLS=['#f5c518','#69f0ae','#40c4ff','#ff5252','#ea80fc','#fff','#ff9800'];for(let i=0;i<65;i++){const el=document.createElement('div');el.className='cf';const sz=6+Math.random()*10;el.style.cssText=`left:${Math.random()*100}vw;top:-12px;width:${sz}px;height:${sz}px;background:${COLS[Math.floor(Math.random()*COLS.length)]};animation-duration:${1.3+Math.random()*2}s;animation-delay:${Math.random()*0.4}s;border-radius:${Math.random()>0.5?'50%':'2px'};`;document.body.appendChild(el);setTimeout(()=>el.remove(),3300);}}
let resizeT=null;
window.addEventListener('resize',()=>{clearTimeout(resizeT);resizeT=setTimeout(()=>computeGeometry(),120);});
function launchGame(){ensureAudio();playWhistle();document.getElementById('handPicker').style.display='none';gameActive=true;computeGeometry();startKeeperPatrol();frameRAF=requestAnimationFrame(drawFrame);}
document.getElementById('btnStart').addEventListener('click',()=>{document.getElementById('intro').style.display='none';document.getElementById('handPicker').style.display='flex';});
document.getElementById('btnLeft').addEventListener('click',()=>{const pw=document.getElementById('powerWrap');pw.style.right='clamp(14px,3vw,34px)';pw.style.left='auto';const tw=document.getElementById('timerWrap');tw.style.left='clamp(14px,3vw,34px)';tw.style.right='auto';launchGame();});
document.getElementById('btnRight').addEventListener('click',()=>{const pw=document.getElementById('powerWrap');pw.style.left='clamp(14px,3vw,34px)';pw.style.right='auto';const tw=document.getElementById('timerWrap');tw.style.right='clamp(14px,3vw,34px)';tw.style.left='auto';launchGame();});
</script>
