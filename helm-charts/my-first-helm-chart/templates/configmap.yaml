rsion: apps/v1
kind: ConfigMap
metadata:
  name: {{ include "nginx-chart.fullname" . }}
  labels:
    app: {{ include "nginx-chart.name" . }}
    environment: {{ .Values.env }}
data:
  certificate: |
    {{ .Values.certificate | b64dec | nindent 9 }}
  key: |
    {{ .Values.privateKey | b64dec | nindent 9 }}