spring:
  application:
    name: docintel-sql
  h2:
    console.enabled: ${docinteldb.h2console:true}
  liquibase:
    enabled: false
    change-log: ${docinteldb.changelog:classpath:/db/changelog/v1/docintel-changelog-full-release.xml}
    default-schema: DCT
    rollback-file: ${docinteldb.rollbackfile:C:\Users\ventio\office work\docintel\docintel-sql\src\main\resources\db\changelog\v1\rollbackFile_docintel.sql}
docintel:
  db:
    enable-db-wallet: ${docinteldb.enable.wallet:false}
    db-wallet:
      docintel:
        wallet-location:   ${docinteldb.wallet.location}
        db-alias:  ${docinteldb.alias}
    datasource:
      docintel:
        connection-timeout: ${docinteldb.connection.timeout:20000} #maximum number of milliseconds that a client will wait for a connection
        minimum-idle: ${docinteldb.min.idle:1} #minimum number of idle connections maintained by HikariCP in a connection pool
        maximum-pool-size: ${docinteldb.max.pool.size:1} #maximum pool size
        idle-timeout: ${docinteldb.idle.timeout:10000} #maximum idle time for connection
        max-lifetime: ${docinteldb.max.lifetime:1000} # maximum lifetime in milliseconds of a connection in the pool after it is closed.
        auto-commit: ${docinteldb.auto.commit:true} #default auto-commit behavior.
        driver-class-name: ${docintel.db.driver.class:oracle.jdbc.OracleDriver}
        username: ${docintel.db.user}
        password: ${docintel.db.pwd}
        jdbc-url: ${docintel.db.url}