services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-free
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      - ORACLE_PWD=admin123
      - ORACLE_CHARACTERSET=AL32UTF8
    volumes:
      - oracle_free_data:/opt/oracle/oradata
    # healthcheck:
    #   test: ["CMD-SHELL", "$ORACLE_HOME/bin/tnsping FREEPDB1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 20

volumes:
  oracle_free_data:
