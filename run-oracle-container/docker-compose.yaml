services:
  oracle-db:
    image: container-registry.oracle.com/database/enterprise:latest
    container_name: oracle-ee
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      - ORACLE_PWD=admin123  # Set your SYS/SYSTEM password
      - ORACLE_CHARACTERSET=AL32UTF8
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "$ORACLE_HOME/bin/tnsping LISTENER"]
      interval: 30s
      timeout: 10s
      retries: 20

volumes:
  oracle_data:
